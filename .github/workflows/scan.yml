name: Scheduled Flag Scan

on:
  schedule:
    # Run daily at 08:00 UTC (start of business)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install poetry && poetry install --no-interaction

      - name: Run scanner
        id: scan
        env:
          TARGET_REPO: bgtripp/LogiOps
          MOCK_LD_DATA_PATH: ./mock_launchdarkly.json
        run: |
          output=$(poetry run python main.py scan 2>&1)
          echo "$output"
          # Count candidates
          count=$(echo "$output" | grep -c '^\s\+[0-9]\+\.' || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          # Save full output for the issue body
          {
            echo "scan_output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Issue
        if: steps.scan.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[CodeCull] ${${{ steps.scan.outputs.count }}} stale feature flag(s) detected`;
            const body = [
              `## Stale Flag Scan — ${new Date().toISOString().split('T')[0]}`,
              '',
              '```',
              `${{ steps.scan.outputs.scan_output }}`,
              '```',
              '',
              '**Next steps:** Open the [CodeCull dashboard](https://your-codecull-host:8000) to review and approve cleanup.',
            ].join('\n');

            // Close previous scan issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'codecull-scan',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

            // Open new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['codecull-scan'],
            });
