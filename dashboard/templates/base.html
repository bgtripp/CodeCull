<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CodeCull{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-row">
                <h1 class="logo">
                    <span class="logo-icon">&#x2702;</span> CodeCull
                </h1>
                <p class="tagline">Stale feature flag cleanup</p>
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>CodeCull &mdash; automated feature flag hygiene</p>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
