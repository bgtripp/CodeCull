{% extends "base.html" %}

{% block title %}CodeCull &mdash; Enter passcode{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Check your email</h2>
        <p class="auth-subtitle">We sent a 6-digit code to <strong>{{ email }}</strong></p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/verify" class="auth-form">
            <input type="hidden" name="email" value="{{ email }}" />
            <label for="code" class="auth-label">Passcode</label>
            <input
                type="text"
                id="code"
                name="code"
                class="auth-input auth-input--code"
                placeholder="123456"
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                required
                autofocus
            />
            <button type="submit" class="btn btn-secondary auth-btn">Verify</button>
        </form>

        <form method="post" action="/auth/login" class="auth-resend">
            <input type="hidden" name="email" value="{{ email }}" />
            <button type="submit" class="auth-resend-btn">Resend code</button>
        </form>
    </div>
</div>
{% endblock %}
